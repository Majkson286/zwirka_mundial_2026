<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typer Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0e0a; --panel:#121812; --panel2:#1a221a; --line:#27331f;
  --green:#3ddc6e; --green-dim:#2a9d4f; --yellow:#f2c94c; --red:#eb5757;
  --txt:#e8f0e6; --muted:#8a9a85; --gold:#ffd24a;
  --grass:#14361f;
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;width:100%}
body{position:relative;width:100%;max-width:100%;overflow-x:hidden}
body{
  font-family:'Archivo',sans-serif; background:var(--bg); color:var(--txt);
  min-height:100vh; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(61,220,110,.08), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(242,201,76,.05), transparent 45%);
}
#app{width:100%;max-width:100%;overflow-x:hidden}
.wrap{max-width:880px;margin:0 auto;padding:0 16px 80px}
h1,h2,h3{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-weight:400;line-height:1}

/* HEADER */
header{
  position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
  background:rgba(10,14,10,.82);border-bottom:1px solid var(--line);
}
.hd{max-width:880px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.goat{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:22px;background:var(--grass);
  border:2px solid var(--green);box-shadow:0 0 18px rgba(61,220,110,.4)}
.logo b{font-family:'Bebas Neue';font-size:26px;letter-spacing:1.5px}
.logo span{color:var(--green)}
.userbox{display:flex;align-items:center;gap:10px;font-size:14px}
.userbox .pts{background:var(--grass);color:var(--green);padding:4px 10px;border-radius:20px;font-weight:700;border:1px solid var(--green-dim)}
.btn{
  font-family:'Archivo';font-weight:700;cursor:pointer;border:none;border-radius:10px;
  padding:10px 16px;font-size:14px;transition:.15s;letter-spacing:.3px;
}
.btn-green{background:var(--green);color:#062611}
.btn-green:hover{background:#56e884;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn-ghost:hover{color:var(--txt);border-color:var(--green-dim)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* NAV */
nav{display:flex;gap:6px;margin:18px 0 8px;flex-wrap:wrap}
.tab{
  font-family:'Bebas Neue';font-size:20px;letter-spacing:1px;padding:8px 18px;
  border-radius:10px;cursor:pointer;color:var(--muted);background:var(--panel);
  border:1px solid var(--line);transition:.15s
}
.tab.active{color:#062611;background:var(--green);border-color:var(--green)}
.tab:hover:not(.active){color:var(--txt)}

/* AUTH */
.auth-screen{min-height:80vh;display:flex;align-items:center;justify-content:center;padding-top:40px}
.auth-card{
  width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);
  border-radius:20px;padding:34px 28px;box-shadow:0 20px 60px rgba(0,0,0,.5)
}
.auth-card h2{font-size:40px;margin-bottom:4px}
.auth-card .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.field input{
  width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;color:var(--txt);font-family:'Archivo';font-size:15px;transition:.15s
}
.field input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(61,220,110,.15)}
.auth-toggle{text-align:center;margin-top:18px;font-size:14px;color:var(--muted)}
.auth-toggle a{color:var(--green);cursor:pointer;font-weight:600}
.msg{padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:14px}
.msg.error{background:rgba(235,87,87,.12);color:#ff8585;border:1px solid rgba(235,87,87,.3)}
.msg.ok{background:var(--grass);color:var(--green);border:1px solid var(--green-dim)}

/* MATCH CARD */
.daygroup{margin-top:22px}
.dayhead{font-family:'Bebas Neue';font-size:22px;color:var(--yellow);letter-spacing:1.5px;margin:0 4px 10px;display:flex;align-items:center;gap:10px}
.dayhead::after{content:'';flex:1;height:1px;background:var(--line)}
.match{
  background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:16px;margin-bottom:12px;transition:.15s
}
.match:hover{border-color:var(--green-dim)}
.match.locked{opacity:.92}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:12px;color:var(--muted)}
.tag{background:var(--panel2);padding:3px 9px;border-radius:6px;letter-spacing:.5px;font-weight:600}
.tag.grp{color:var(--green)}
.kotime{font-weight:600}
.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}
.team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.team .flag{font-size:30px;line-height:1}
.flag-img{width:42px;height:auto;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.4);display:block}
.flag-fallback{font-size:30px;line-height:1}
.team .nm{font-weight:700;font-size:15px}
.score-in{display:flex;align-items:center;gap:8px;justify-content:center}
.score-in input{
  width:46px;height:46px;text-align:center;font-family:'Bebas Neue';font-size:28px;
  background:var(--bg);border:2px solid var(--line);border-radius:10px;color:var(--txt);
  -moz-appearance:textfield;appearance:textfield;padding:0;line-height:46px
}
.score-in input::-webkit-outer-spin-button,
.score-in input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.score-in input:focus{outline:none;border-color:var(--green)}
.score-in .sep{color:var(--muted);font-family:'Bebas Neue';font-size:26px}
.vs{font-family:'Bebas Neue';font-size:20px;color:var(--muted)}
.match-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
.status{font-size:13px;display:flex;align-items:center;gap:6px}
.status .dot{width:8px;height:8px;border-radius:50%}
.dot.open{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.locked{background:var(--red)}
.dot.done{background:var(--yellow)}
.result-badge{font-family:'Bebas Neue';font-size:24px;letter-spacing:2px}
.your-pts{font-size:13px;font-weight:700}
.your-pts.hit10{color:var(--green)}
.your-pts.hit5{color:var(--yellow)}
.your-pts.hit0{color:var(--muted)}
.saved-pred{font-size:13px;color:var(--muted)}
.saved-pred b{color:var(--txt)}

/* LEADERBOARD */
.lb{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:18px}
.lb-row{display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
.lb-row:last-child{border-bottom:none}
.lb-row.head{background:var(--panel2);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.lb-row.me{background:var(--grass)}
.lb-rank{font-family:'Bebas Neue';font-size:26px;text-align:center}
.lb-rank.gold{color:var(--gold)} .lb-rank.silver{color:#c8d0d8} .lb-rank.bronze{color:#cd9b6a}
.lb-name{font-weight:700;font-size:16px}
.lb-name small{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:2px}
.lb-total{font-family:'Bebas Neue';font-size:30px;color:var(--green)}
.lb-total small{font-size:13px;color:var(--muted);font-family:'Archivo'}

/* INFO / RULES */
.info-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;margin-top:18px}
.info-card h3{font-size:24px;color:var(--green);margin-bottom:12px}
.rule{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--line)}
.rule:last-child{border:none}
.rule .pt{font-family:'Bebas Neue';font-size:34px;color:var(--gold);min-width:54px;text-align:center}
.rule .desc{font-size:14px;color:var(--muted)}
.rule .desc b{color:var(--txt);font-size:15px;display:block;margin-bottom:2px}

/* TYPY GRACZY POD MECZEM + PROFIL */
.bets-toggle{margin-top:12px;padding:8px;text-align:center;font-size:13px;font-weight:600;color:var(--green);cursor:pointer;border-top:1px solid var(--line);user-select:none}
.bets-toggle:hover{color:#56e884}
.bets-list{margin-top:6px}
.bets-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);font-size:14px}
.bets-row:last-child{border-bottom:none}
.bets-name{flex:1;font-weight:600}
.bets-typ{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px}
.bets-pts{font-weight:700;font-size:13px;min-width:32px;text-align:right}
.bets-pts.hit10{color:var(--green)} .bets-pts.hit5{color:var(--yellow)} .bets-pts.hit0{color:var(--muted)}
.lb-clickable{cursor:pointer;transition:.12s}
.lb-clickable:hover{background:var(--panel2)}
.back-link{color:var(--green);cursor:pointer;font-size:14px;font-weight:600}
.back-link:hover{color:#56e884}
.prof-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line)}
.prof-row:last-child{border-bottom:none}
.prof-match{font-size:14px}
.prof-match b{color:var(--green);font-family:'Bebas Neue';font-size:17px;letter-spacing:1px;margin:0 3px}
.prof-match small{display:block;color:var(--muted);font-size:11px;margin-top:2px}
.prof-right{display:flex;align-items:center;gap:10px}
.prof-res{font-family:'Bebas Neue';font-size:18px;letter-spacing:1px}

/* TYPY SPECJALNE */
.special-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.special-group{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px}
.special-group-label{font-family:'Bebas Neue';font-size:18px;color:var(--green);letter-spacing:1px;margin-bottom:6px}
.special-locked-pick{font-size:14px;font-weight:700}
.special-select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:9px;font-family:'Archivo';font-size:14px}
.special-select:focus{outline:none;border-color:var(--green)}

/* ADMIN */
.admin-match{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.admin-match .nm{font-size:14px;font-weight:600}
.admin-match .nm small{color:var(--muted);font-weight:400}
.admin-ctrl{display:flex;align-items:center;gap:6px}
.admin-ctrl input{width:42px;height:38px;text-align:center;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-family:'Bebas Neue';font-size:20px;-moz-appearance:textfield;appearance:textfield;padding:0;line-height:38px}
.admin-ctrl input::-webkit-outer-spin-button,
.admin-ctrl input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.admin-ctrl .btn{padding:8px 12px;font-size:13px}

.empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}
.loading{text-align:center;color:var(--muted);padding:40px;font-family:'Bebas Neue';font-size:24px;letter-spacing:1px}
.filterbar{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.chip{font-size:13px;padding:6px 12px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--muted);cursor:pointer}
.chip.active{background:var(--green-dim);color:#fff;border-color:var(--green)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--green);color:var(--green);padding:12px 22px;border-radius:12px;font-weight:600;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.5);animation:pop .25s}
@keyframes pop{from{opacity:0;transform:translateX(-50%) translateY(10px)}}
@media(max-width:560px){
  .wrap{padding:0 10px 70px}
  /* Nagłówek: mniejsze logo, zawijanie, kompaktowy */
  .hd{padding:10px 12px;gap:8px;flex-wrap:wrap}
  .logo b{font-size:21px;letter-spacing:1px}
  .goat{width:28px;height:28px;font-size:18px}
  .userbox{gap:6px;font-size:13px}
  .userbox .pts{padding:3px 8px;font-size:12px}
  .userbox > span{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .btn{padding:8px 12px;font-size:13px}
  .userbox .btn{padding:7px 10px;font-size:12px}
  /* Nawigacja */
  nav{gap:5px;margin:14px 0 6px}
  .tab{font-size:17px;padding:6px 13px}
  /* Karty meczów */
  .match{padding:13px 11px;border-radius:14px}
  .teams{grid-template-columns:1fr auto 1fr;gap:4px}
  .team{gap:5px}
  .team .nm{font-size:12px;line-height:1.1}
  .flag-img{width:36px}
  .score-in{gap:5px}
  .score-in input{width:40px;height:40px;font-size:24px;line-height:40px}
  .score-in .sep{font-size:22px}
  .match-actions{flex-wrap:wrap;gap:8px}
  .status{font-size:12px}
  /* Ranking */
  .lb-row{grid-template-columns:36px 1fr auto;padding:11px 12px;gap:8px}
  .lb-rank{font-size:22px}
  .lb-name{font-size:14px}
  .lb-name small{font-size:11px}
  .lb-total{font-size:25px}
  /* Panel admina */
  .admin-match{grid-template-columns:1fr;gap:8px}
  .admin-ctrl{justify-content:flex-start;flex-wrap:wrap}
  /* Zasady */
  .rule .pt{font-size:28px;min-width:44px}
  .info-card{padding:18px 15px}
  .special-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="/app.js"></script>
</body>
</html>
